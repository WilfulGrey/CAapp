name: Tests

on:
  pull_request:
    branches: [integration/mamamia-onboarding, main]
  push:
    branches: [integration/mamamia-onboarding]

jobs:
  # ─── Frontend (CAapp Vite) ─────────────────────────────────────────────
  vitest:
    name: vitest (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # Pin timezone to Europe/Berlin — `formatDate('YYYY-12-31T23:59:59Z')`
      # rolls into next year only when local TZ is UTC+. Beta + prod serve
      # German customers, so pinning Berlin matches actual user behaviour.
      - name: Run vitest
        run: npx vitest run
        env:
          TZ: Europe/Berlin

      # TypeScript check (build config skips test files)
      - name: Typecheck (src/)
        run: npx tsc --noEmit -p tsconfig.build.json

  # ─── Edge Functions (Deno) ─────────────────────────────────────────────
  deno-onboard:
    name: deno tests (onboard-to-mamamia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Run onboard tests
        working-directory: supabase/functions/onboard-to-mamamia
        run: deno task test

  deno-proxy:
    name: deno tests (mamamia-proxy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Run proxy tests
        working-directory: supabase/functions/mamamia-proxy
        run: deno task test
