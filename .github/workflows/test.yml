name: Tests

on:
  pull_request:
    branches: [integration/mamamia-onboarding, main]
  push:
    branches: [integration/mamamia-onboarding]
  # Manual trigger — deploys Edge Functions regardless of diff. Useful to
  # ship a function whose code is already merged but not yet deployed.
  workflow_dispatch:

jobs:
  # ─── Frontend (CAapp Vite) ─────────────────────────────────────────────
  vitest:
    name: vitest (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # Pin timezone to Europe/Berlin — `formatDate('YYYY-12-31T23:59:59Z')`
      # rolls into next year only when local TZ is UTC+. Beta + prod serve
      # German customers, so pinning Berlin matches actual user behaviour.
      - name: Run vitest
        run: npx vitest run
        env:
          TZ: Europe/Berlin

      # TypeScript check (build config skips test files)
      - name: Typecheck (src/)
        run: npx tsc --noEmit -p tsconfig.build.json

  # ─── Edge Functions (Deno) ─────────────────────────────────────────────
  deno-onboard:
    name: deno tests (onboard-to-mamamia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Run onboard tests
        working-directory: supabase/functions/onboard-to-mamamia
        run: deno task test

  deno-proxy:
    name: deno tests (mamamia-proxy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Run proxy tests
        working-directory: supabase/functions/mamamia-proxy
        run: deno task test

  # ─── Deploy CA-App Edge Functions (after merge to integration/mamamia-onboarding) ─
  # Strukturalnie eliminuje race condition gdzie ktoś deployuje ze swojego
  # lokalnego stanu i nadpisuje cudze zmiany w chmurze. Po merge PR-a CI
  # robi single source of truth deploy z git HEAD.
  #
  # Deployuje TYLKO funkcje z repo-root supabase/functions/ na projekt
  # CA-App (ycdwtrklpoqprabtwahi). Funkcje kostenrechnera (project 3/...)
  # idą osobnym jobem niżej — inny projekt Supabase, inne konto.
  #
  # Wymaga GitHub Secret: SUPABASE_ACCESS_TOKEN
  #   gh secret set SUPABASE_ACCESS_TOKEN
  #   (wygeneruj na https://supabase.com/dashboard/account/tokens)
  deploy-edge-functions:
    name: Deploy CA-App Edge Functions to Supabase
    needs: [vitest, deno-onboard, deno-proxy]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/integration/mamamia-onboarding') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # need previous commit for diff check below
          fetch-depth: 2

      - name: Check if CA-App Edge Functions changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — deploying regardless of diff."
            echo "skip=false" >> $GITHUB_OUTPUT
          elif git diff --quiet ${{ github.event.before }} ${{ github.sha }} -- supabase/functions/; then
            echo "CA-App Edge Functions unchanged in this push — skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "CA-App Edge Functions changed — proceeding with deploy."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: supabase/setup-cli@v1
        if: steps.changed.outputs.skip != 'true'
        with:
          version: latest

      # Tylko funkcje istniejące w repo-root supabase/functions/.
      - name: Deploy functions
        if: steps.changed.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in mamamia-proxy onboard-to-mamamia; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref ycdwtrklpoqprabtwahi
            echo "::endgroup::"
          done

  # ─── Deploy kostenrechner Edge Functions (project 3/) ─────────────────────
  # Funkcje kostenrechnera leżą w `project 3/supabase/functions/` — ten sam
  # projekt Supabase co CA-App (monorepo, wspólny ycdwtrklpoqprabtwahi), ale
  # `supabase functions deploy` szuka funkcji względem cwd. Dlatego osobny
  # job z working-directory "project 3" + własny diff-trigger.
  deploy-kostenrechner-edge-functions:
    name: Deploy kostenrechner Edge Functions to Supabase
    needs: [vitest, deno-onboard, deno-proxy]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/integration/mamamia-onboarding') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if kostenrechner Edge Functions changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — deploying regardless of diff."
            echo "skip=false" >> $GITHUB_OUTPUT
          elif git diff --quiet ${{ github.event.before }} ${{ github.sha }} -- 'project 3/supabase/functions/'; then
            echo "kostenrechner Edge Functions unchanged — skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "kostenrechner Edge Functions changed — proceeding with deploy."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: supabase/setup-cli@v1
        if: steps.changed.outputs.skip != 'true'
        with:
          version: latest

      - name: Deploy kostenrechner functions
        if: steps.changed.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Katalog "project 3" ma spację w nazwie — psuje to docker volume
          # mount w supabase CLI ("entrypoint path does not exist"). Kopiujemy
          # funkcje do ścieżki bez spacji i deployujemy stamtąd. Funkcje
          # kostenrechnera są samodzielne (brak _shared), więc kopia wystarcza.
          rm -rf /tmp/kr-deploy
          mkdir -p /tmp/kr-deploy/supabase
          cp -r "project 3/supabase/functions" /tmp/kr-deploy/supabase/
          cd /tmp/kr-deploy
          for fn in chat-ai schedule-email send-scheduled-emails; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref ycdwtrklpoqprabtwahi
            echo "::endgroup::"
          done
