name: Tests

on:
  pull_request:
    branches: [integration/mamamia-onboarding, main]
  push:
    branches: [integration/mamamia-onboarding]

jobs:
  # ─── Frontend (CAapp Vite) ─────────────────────────────────────────────
  vitest:
    name: vitest (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # Pin timezone to Europe/Berlin — `formatDate('YYYY-12-31T23:59:59Z')`
      # rolls into next year only when local TZ is UTC+. Beta + prod serve
      # German customers, so pinning Berlin matches actual user behaviour.
      - name: Run vitest
        run: npx vitest run
        env:
          TZ: Europe/Berlin

      # TypeScript check (build config skips test files)
      - name: Typecheck (src/)
        run: npx tsc --noEmit -p tsconfig.build.json

  # ─── Edge Functions (Deno) ─────────────────────────────────────────────
  deno-onboard:
    name: deno tests (onboard-to-mamamia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Run onboard tests
        working-directory: supabase/functions/onboard-to-mamamia
        run: deno task test

  deno-proxy:
    name: deno tests (mamamia-proxy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Run proxy tests
        working-directory: supabase/functions/mamamia-proxy
        run: deno task test

  # ─── Deploy Edge Functions (after merge to integration/mamamia-onboarding) ─
  # Strukturalnie eliminuje race condition gdzie ktoś deployuje ze swojego
  # lokalnego stanu i nadpisuje cudze zmiany w chmurze. Po merge PR-a CI
  # robi single source of truth deploy z git HEAD.
  #
  # Wymaga GitHub Secret: SUPABASE_ACCESS_TOKEN
  #   gh secret set SUPABASE_ACCESS_TOKEN
  #   (wygeneruj na https://supabase.com/dashboard/account/tokens)
  deploy-edge-functions:
    name: Deploy Edge Functions to Supabase
    needs: [vitest, deno-onboard, deno-proxy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/integration/mamamia-onboarding'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # need previous commit for diff check below
          fetch-depth: 2

      - name: Check if Edge Functions changed
        id: changed
        run: |
          if git diff --quiet ${{ github.event.before }} ${{ github.sha }} -- supabase/functions/; then
            echo "Edge Functions unchanged in this push — skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Edge Functions changed — proceeding with deploy."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: supabase/setup-cli@v1
        if: steps.changed.outputs.skip != 'true'
        with:
          version: latest

      # Deployujemy wszystkie funkcje po kolei. Każda to ~5s — fail-fast, jeśli
      # jedna padnie reszta się nie deployuje (lepiej zauważyć regresję
      # natychmiast niż mieć rozjazd między funkcjami).
      - name: Deploy functions
        if: steps.changed.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in mamamia-proxy onboard-to-mamamia chat-ai schedule-email send-scheduled-emails betreuung-beauftragen; do
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref ycdwtrklpoqprabtwahi
            echo "::endgroup::"
          done
